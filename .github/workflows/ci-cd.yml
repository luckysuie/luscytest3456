name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Permissions required for GitHub Pages and Azure Login
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-test:
    name: Build and Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for SonarCloud analysis

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # We only enable caching if the lock file exists to avoid the "lock file not found" error
          cache: ${{ hashFiles('package-lock.json') != '' && 'npm' || '' }}

      - name: Install Dependencies
        run: |
          if [ -f package-lock.json ]; then
            echo "Lock file found. Running npm ci..."
            npm ci
          else
            echo "Lock file NOT found. Running npm install..."
            npm install
          fi

      - name: Build Application
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  database-protection:
    name: Database Protection
    needs: build-and-test
    runs-on: ubuntu-latest
    # Run on push to main OR on pull request to main
    if: (github.event_name == 'push' || github.event_name == 'pull_request') && (github.ref == 'refs/heads/main' || github.base_ref == 'main')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for reliable git diff

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Detect Database Changes
        id: detect
        run: |
          chmod +x scripts/detect-db-changes.sh
          
          # Determine SHAs based on event type
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BEFORE_SHA="${{ github.event.pull_request.base.sha }}"
            AFTER_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BEFORE_SHA="${{ github.event.before }}"
            AFTER_SHA="${{ github.sha }}"
          fi
          
          if ./scripts/detect-db-changes.sh "$BEFORE_SHA" "$AFTER_SHA" "${{ github.event_name }}"; then
            echo "db_changed=true" >> $GITHUB_OUTPUT
          else
            echo "db_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Backup Database (Mock Mode)
        if: steps.detect.outputs.db_changed == 'true'
        id: backup
        run: |
          chmod +x scripts/backup-db.sh
          ./scripts/backup-db.sh "${{ github.ref_name }}" "${{ github.sha }}"

      - name: Upload Backup to Azure Blob
        if: steps.detect.outputs.db_changed == 'true'
        run: |
          chmod +x scripts/upload-to-blob.sh
          ./scripts/upload-to-blob.sh \
            "${{ steps.backup.outputs.backup_dir }}" \
            "${{ secrets.AZURE_STORAGE_ACCOUNT }}" \
            "${{ secrets.AZURE_STORAGE_KEY }}" \
            "${{ secrets.BLOB_CONTAINER_NAME }}"

  deploy:
    name: Deploy to GitHub Pages
    needs: [build-and-test, database-protection]
    # Only deploy on push to main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Create CNAME file
        run: echo "luckycloudops123.xyz" > dist/CNAME

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
